---
- name: Prepare Prometheus configs (run on localhost)
  hosts: localhost
  gather_facts: false

  vars:
    terraform_dir: "{{ playbook_dir }}/../../terraform"

  tasks:
    - name: Get node_exporter targets from Terraform output (JSON)
      ansible.builtin.command:
        cmd: terraform output -json node_exporter_targets
        chdir: "{{ terraform_dir }}"
      register: tf_node_targets_raw
      changed_when: false

    - name: Get web private IPs from Terraform output (JSON)
      ansible.builtin.command:
        cmd: terraform output -json web_private_ips
        chdir: "{{ terraform_dir }}"
      register: tf_web_ips_raw
      changed_when: false

    - name: Build final scrape configs for Prometheus (store in hostvars for monitoring)
      ansible.builtin.set_fact:
        prometheus_scrape_configs_final:
          - job_name: "node_exporter"
            static_configs:
              - targets: "{{ tf_node_targets_raw.stdout | from_json }}"
          - job_name: "nginx_logs"
            static_configs:
              - targets: >-
                  {{
                    (tf_web_ips_raw.stdout | from_json | dict2items
                     | map(attribute='value')
                     | map('regex_replace', '$', ':4040')
                     | list)
                  }}

    - name: Debug final scrape configs
      debug:
        var: prometheus_scrape_configs_final

- name: Install Prometheus server
  hosts: prometheus_host
  become: true

  collections:
    - prometheus.prometheus

  roles:
    - role: prometheus
      vars:
        prometheus_version: "3.5.3"
        prometheus_web_listen_address: "0.0.0.0:9090"
        prometheus_scrape_configs: "{{ hostvars['localhost'].prometheus_scrape_configs_final }}"
