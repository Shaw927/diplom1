- name: Install required packages for Docker repo
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create Docker keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable"
    state: present
    filename: docker

- name: Install Docker engine and compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - python3-docker
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and started
  systemd:
    name: docker
    enabled: true
    state: started

- name: Create Filebeat directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ filebeat_install_dir }}"
    - "{{ filebeat_data_dir }}"

- name: Render Filebeat config
  template:
    src: filebeat.yml.j2
    dest: "{{ filebeat_install_dir }}/filebeat.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart filebeat stack

- name: Render Filebeat docker-compose
  copy:
    dest: "{{ filebeat_install_dir }}/docker-compose.yml"
    mode: "0644"
    content: |
      services:
        filebeat:
          image: docker.elastic.co/beats/filebeat:{{ filebeat_version }}
          container_name: filebeat
          user: root
          restart: unless-stopped
          volumes:
            - {{ filebeat_install_dir }}/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
            - /var/log/nginx:/var/log/nginx:ro
            - {{ filebeat_data_dir }}:/usr/share/filebeat/data
          command: ["--strict.perms=false"]
  notify: Restart filebeat stack

- name: Start Filebeat stack
  community.docker.docker_compose_v2:
    project_src: "{{ filebeat_install_dir }}"
    state: present

