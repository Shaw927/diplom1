- name: Install required packages for Docker repo
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create Docker keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable"
    state: present
    filename: docker

- name: Install Docker engine and compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - python3-docker
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and started
  systemd:
    name: docker
    enabled: true
    state: started

- name: Create Kibana directory
  file:
    path: "{{ kibana_install_dir }}"
    state: directory
    mode: "0755"

- name: Render Kibana docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ kibana_install_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart kibana stack

- name: Start Kibana stack
  community.docker.docker_compose_v2:
    project_src: "{{ kibana_install_dir }}"
    state: present

